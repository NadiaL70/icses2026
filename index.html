<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICSES 2026 | Global Consensus</title>
    <style>
        :root { 
            --icses-blue: #004a99; 
            --neon: #00f2ff;
            --dark-bg: #1a1a1a;
        }
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* HEADER SECTION */
        .header {
            background: var(--icses-blue);
            color: white;
            width: 100%;
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .container { 
            max-width: 900px; 
            width: 95%;
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            margin: -30px 0 50px 0; /* Overlaps the header for a modern look */
        }

        /* STATS BAR */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-bottom: 4px solid var(--icses-blue);
        }
        .stat-number { font-size: 2em; font-weight: bold; color: var(--icses-blue); }
        .stat-label { font-size: 0.9em; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        /* THE IMAGE AREA */
        .game-area { 
            position: relative; 
            cursor: crosshair; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000; 
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }
        .game-area img { 
            display: block; 
            width: 100%; 
            opacity: 0.95; 
        }
        
        /* THE CLICK DOTS */
        .click-dot {
            position: absolute;
            width: 14px; height: 14px;
            background: var(--neon);
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 12px var(--neon);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }
        }

        .instruction {
            background: #fff9db;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #fcc419;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>ICSES 2026 VANCOUVER</h1>
    <p>Scientific Program Consensus Challenge</p>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="count-display">0</div>
            <div class="stat-label">Experts Synced</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">72.1%</div>
            <div class="stat-label">Congress Target</div>
        </div>
    </div>

    <div class="instruction">
        <strong>Case Study:</strong> A 62-year-old patient with a 4-part proximal humerus fracture. Click the image to place your primary reduction anchor.
    </div>
    
    <div class="game-area" id="heatmap-area">
        <img src="humerus.png" alt="Shoulder X-Ray Simulation">
        <div id="dots-container"></div>
    </div>
</div>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzfodw3eKErkOubHpCUUOJXSAnjBAXhGK6seAw_YeOl780OSiwW3xoF403uAkL8Pwf0Ag/exec";

    const area = document.getElementById('heatmap-area');
    const dots = document.getElementById('dots-container');
    const countDisplay = document.getElementById('count-display');

    // Handle Clicks
    area.addEventListener('click', function(e) {
        const rect = area.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        createDot(x, y); 

        fetch(SHEETS_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify({ x: x, y: y, region: 'Global' })
        });

        // Increment count locally for instant feedback
        countDisplay.innerText = parseInt(countDisplay.innerText) + 1;
    });

    async function loadData() {
        try {
            const res = await fetch(SHEETS_URL);
            const data = await res.json();
            
            // Update the "Experts Synced" number
            countDisplay.innerText = data.length;

            // Draw the dots
            data.forEach(row => createDot(row[1], row[2]));
        } catch (e) { 
            console.log("No data yet."); 
        }
    }

    function createDot(x, y) {
        const dot = document.createElement('div');
        dot.className = 'click-dot';
        dot.style.left = x + '%';
        dot.style.top = y + '%';
        dots.appendChild(dot);
    }

    window.onload = loadData;
</script>

</body>
</html>
