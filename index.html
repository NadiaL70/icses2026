<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICSES 2026 | Global Consensus</title>
    <style>
        :root { --icses-blue: #004a99; --neon: #00f2ff; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f7f9; }
        .container { max-width: 800px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-top: 20px; }
        
        /* The Interactive Map */
        .game-area { position: relative; cursor: crosshair; border: 2px solid var(--icses-blue); border-radius: 8px; overflow: hidden; background: #000; }
        .game-area img { display: block; width: 100%; opacity: 0.9; }
        
        .click-dot {
            position: absolute;
            width: 12px; height: 12px;
            background: var(--neon);
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 8px var(--neon);
        }
        .sync-bar { width: 100%; height: 20px; background: #ddd; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .sync-fill { height: 100%; width: 72.1%; background: linear-gradient(90deg, var(--icses-blue), var(--neon)); transition: width 1s; }
    </style>
</head>
<body>

<div class="container">
    <h2>ICSES 2026: Global Reconstruction Map</h2>
    <p>Mark your primary anchor point for this 4-part fracture.</p>
    
    <div class="sync-bar"><div class="sync-fill" id="bar"></div></div>
    
    <div class="game-area" id="heatmap-area">
        <img src="humerus.png" alt="Surgical Case">
        <div id="dots-container"></div>
    </div>
</div>

<script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzfodw3eKErkOubHpCUUOJXSAnjBAXhGK6seAw_YeOl780OSiwW3xoF403uAkL8Pwf0Ag/exec";

    const area = document.getElementById('heatmap-area');
    const dots = document.getElementById('dots-container');

    // Handle Clicks
    area.addEventListener('click', function(e) {
        const rect = area.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        createDot(x, y); // Immediate visual feedback

        // Send to Google Sheet
        fetch(SHEETS_URL, {
            method: 'POST',
            mode: 'no-cors', 
            body: JSON.stringify({ x: x, y: y, region: 'Global' })
        });
    });

    // Load existing dots from Google Sheet
    async function loadDots() {
        try {
            const res = await fetch(SHEETS_URL);
            const data = await res.json();
            data.forEach(row => createDot(row[1], row[2]));
        } catch (e) { console.log("Starting fresh map."); }
    }

    function createDot(x, y) {
        const dot = document.createElement('div');
        dot.className = 'click-dot';
        dot.style.left = x + '%';
        dot.style.top = y + '%';
        dots.appendChild(dot);
    }

    window.onload = loadDots;
</script>

</body>
</html>
